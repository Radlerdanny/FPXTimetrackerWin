name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Derive version from tag
        id: ver
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          if [ -z "$TAG" ] || [ "$TAG" = "$GITHUB_REF_NAME" ]; then
            TAG="0.0.0-dev"
          fi
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

      - name: Patch APP_VERSION
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          (Get-Content fpx_common.py) `
            -replace 'APP_VERSION\s*=\s*"[^"]+"', ('APP_VERSION = "' + $v + '"') `
            | Set-Content fpx_common.py

      - name: Generate placeholder icons
        run: python build/make_icons.py

      - name: Build EXE (PyInstaller)
        run: python build/build_exe.py

      - name: Install Inno Setup
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.5
        with:
          path: build/installer.iss
          options: /DAppVersion=${{ steps.ver.outputs.version }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FPXTimetracker-${{ steps.ver.outputs.version }}
          path: |
            dist/FPXTimetracker.exe
            dist/FPXTimetracker-Setup-${{ steps.ver.outputs.version }}.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: FPX Timetracker ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            dist/FPXTimetracker-Setup-${{ steps.ver.outputs.version }}.exe
            dist/FPXTimetracker.exe
